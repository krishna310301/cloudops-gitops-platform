apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudops-dev-deployer
  namespace: cloudops-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudops-dev-deployer
  namespace: cloudops-dev
rules:
  - apiGroups: [""]
    resources: ["configmaps", "events", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudops-dev-deployer
  namespace: cloudops-dev
subjects:
  - kind: ServiceAccount
    name: cloudops-dev-deployer
    namespace: cloudops-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudops-dev-deployer

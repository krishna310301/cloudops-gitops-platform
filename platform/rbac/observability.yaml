apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudops-observability-viewer
  namespace: cloudops-observability
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cloudops-observability-viewer
  namespace: cloudops-observability
rules:
  - apiGroups: [""]
    resources: ["configmaps", "endpoints", "events", "pods", "pods/log", "services"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "replicasets", "statefulsets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["monitoring.coreos.com"]
    resources: ["prometheuses", "servicemonitors", "prometheusrules"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cloudops-observability-viewer
  namespace: cloudops-observability
subjects:
  - kind: ServiceAccount
    name: cloudops-observability-viewer
    namespace: cloudops-observability
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: cloudops-observability-viewer

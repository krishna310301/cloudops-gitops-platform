apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "cloudops-demo-app.fullname" . }}
  labels:
    {{- include "cloudops-demo-app.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  revisionHistoryLimit: 5
  progressDeadlineSeconds: {{ .Values.deployment.progressDeadlineSeconds }}
  selector:
    matchLabels:
      {{- include "cloudops-demo-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "cloudops-demo-app.selectorLabels" . | nindent 8 }}
        cloudops.io/environment: {{ .Values.environment.name | quote }}
    spec:
      serviceAccountName: {{ include "cloudops-demo-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: app
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: APP_NAME
              value: cloudops-demo-app
            - name: APP_ENV
              value: {{ .Values.environment.name | quote }}
            - name: APP_VERSION
              value: {{ .Values.image.tag | quote }}
            - name: IMAGE_TAG
              value: {{ .Values.image.tag | quote }}
            - name: FAILURE_MODE
              value: {{ .Values.failureMode.enabled | quote }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

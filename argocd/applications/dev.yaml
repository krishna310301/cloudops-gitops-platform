apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudops-demo-dev
  namespace: argocd
  labels:
    cloudops.io/environment: dev
spec:
  project: cloudops-gitops-platform
  sources:
    - repoURL: REPO_URL_PLACEHOLDER
      targetRevision: HEAD
      path: charts/cloudops-demo-app
      helm:
        releaseName: cloudops-demo-dev
        valueFiles:
          - $values/environments/dev/values.yaml
    - repoURL: REPO_URL_PLACEHOLDER
      targetRevision: HEAD
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudops-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - PruneLast=true
      - ApplyOutOfSyncOnly=true

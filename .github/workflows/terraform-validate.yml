name: Terraform Validate

on:
  pull_request:
    paths:
      - terraform/**
      - .github/workflows/terraform-validate.yml
  workflow_dispatch:

jobs:
  validate:
    name: Validate Terraform configuration
    runs-on: ubuntu-latest
    strategy:
      matrix:
        environment:
          - dev
          - staging
          - prod
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        run: terraform -chdir=terraform fmt -check -recursive

      - name: Terraform init without backend
        run: terraform -chdir=terraform/envs/${{ matrix.environment }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/envs/${{ matrix.environment }} validate
